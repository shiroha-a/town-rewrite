name: town-rewrite

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: town
      POSTGRES_PASSWORD: town
      POSTGRES_DB: town
    ports:
      # ホストの5432は使用中のため55432で公開
      - "55432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U town"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      # ホストの6379は使用中のため56379で公開
      - "56379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build:
      context: ../backend
    command: ["web"]
    environment:
      TOWN_DATABASE_URL: "postgres://town:town@postgres:5432/town?sslmode=disable"
      TOWN_REDIS_ADDR: "redis:6379"
      TOWN_HTTP_ADDR: ":8090"
    ports:
      - "8090:8090"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ../backend
    command: ["worker"]
    environment:
      TOWN_DATABASE_URL: "postgres://town:town@postgres:5432/town?sslmode=disable"
      TOWN_REDIS_ADDR: "redis:6379"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
