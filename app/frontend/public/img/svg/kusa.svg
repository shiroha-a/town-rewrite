      <path d="M8.4 9.5C9 8.7 9.3 7.8 9.3 6.8"/>
    </g>
    <g stroke="#69b04c">
      <path d="M20.6 7.5C19.9 6.6 19.6 5.6 19.8 4.4"/>
      <path d="M22 7.5C22 6.3 22.3 5.3 23 4.3"/>
      <path d="M23.4 7.5C24 6.7 24.3 5.8 24.3 4.8"/>
    </g>
    <g stroke="#69b04c">
      <path d="M11.6 20.5C10.9 19.6 10.6 18.6 10.8 17.4"/>
      <path d="M13 20.5C13 19.3 13.3 18.3 14 17.3"/>
      <path d="M14.4 20.5C15 19.7 15.3 18.8 15.3 17.8"/>
