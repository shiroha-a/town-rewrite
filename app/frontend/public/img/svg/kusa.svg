      <path d="M18.6 28.5C17.9 27.6 17.6 26.6 17.8 25.4"/>
      <path d="M20 28.5C20 27.3 20.3 26.3 21 25.3"/>
    </g>
  </g>
  <!-- light specks -->
  <g fill="#d3edaa" opacity="0.85">
    <circle cx="15" cy="11.5" r="0.7"/>
    <circle cx="27.5" cy="13" r="0.6"/>
    <circle cx="4.5" cy="16.5" r="0.6"/>
    <circle cx="22.5" cy="27" r="0.7"/>
