<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- flat base so tiled cells join without banding -->
  <rect width="32" height="32" fill="#5fc8de"/>
  <!-- foam waves drift slowly left-right (SMIL keeps working inside <img>) -->
  <g fill="none" stroke-linecap="round">
    <g stroke="#ffffff" stroke-width="1.5" opacity="0.9">
      <g>
        <path d="M8.5 14.5c1.7-2.3 4.3-2.3 6 0"/>
        <path d="M14.5 14.5c1.4-1.8 3.5-1.8 4.9 0"/>
        <animateTransform attributeName="transform" type="translate"
          values="0 0; 1.6 -0.4; 0 0; -1.6 0.4; 0 0" dur="5s" repeatCount="indefinite"/>
      </g>
    </g>
    <g stroke="#c9f0f8" stroke-width="1.2">
      <g opacity="0.75">
        <path d="M19.5 24c1.4-1.7 3.4-1.7 4.8 0"/>
        <animateTransform attributeName="transform" type="translate"
          values="0 0; -1.3 0.3; 0 0; 1.3 -0.3; 0 0" dur="6.5s" begin="-2.1s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.75;0.3;0.75" dur="6.5s" begin="-2.1s" repeatCount="indefinite"/>
      </g>
      <g opacity="0.75">
        <path d="M6.5 25.5c1.2-1.5 3-1.5 4.2 0"/>
        <animateTransform attributeName="transform" type="translate"
          values="0 0; 1.2 0.3; 0 0; -1.2 -0.3; 0 0" dur="7s" begin="-4.6s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.75;0.35;0.75" dur="7s" begin="-4.6s" repeatCount="indefinite"/>
      </g>
      <g opacity="0.75">
        <path d="M20 6.5c1.2-1.5 3-1.5 4.2 0"/>
        <animateTransform attributeName="transform" type="translate"
          values="0 0; -1.2 -0.3; 0 0; 1.2 0.3; 0 0" dur="5.8s" begin="-1.4s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.75;0.4;0.75" dur="5.8s" begin="-1.4s" repeatCount="indefinite"/>
      </g>
    </g>
  </g>
</svg>
