<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- bare ground: flat base so tiled cells join without banding -->
  <rect width="32" height="32" fill="#cfa76a"/>
  <!-- pebbles and soil speckles (kept away from edges) -->
  <g fill="#b8905a">
    <ellipse cx="7" cy="8" rx="1.5" ry="1" transform="rotate(-12 7 8)"/>
    <ellipse cx="22" cy="6.5" rx="1.2" ry="0.8" transform="rotate(10 22 6.5)"/>
    <ellipse cx="13.5" cy="17" rx="1.3" ry="0.9" transform="rotate(-8 13.5 17)"/>
    <ellipse cx="26" cy="20" rx="1.4" ry="0.9" transform="rotate(14 26 20)"/>
    <ellipse cx="8.5" cy="26" rx="1.2" ry="0.8" transform="rotate(-10 8.5 26)"/>
    <ellipse cx="19" cy="27.5" rx="1.1" ry="0.7" transform="rotate(8 19 27.5)"/>
  </g>
  <g fill="#a3814f" opacity="0.7">
    <circle cx="16.5" cy="9.5" r="0.6"/>
    <circle cx="27" cy="12.5" r="0.55"/>
    <circle cx="5" cy="15" r="0.55"/>
    <circle cx="22.5" cy="24" r="0.6"/>
    <circle cx="12" cy="23" r="0.5"/>
  </g>
  <g fill="#e8d2a0" opacity="0.9">
    <circle cx="11" cy="12" r="0.6"/>
    <circle cx="24.5" cy="9.5" r="0.55"/>
    <circle cx="17.5" cy="21.5" r="0.6"/>
    <circle cx="6.5" cy="20.5" r="0.5"/>
    <circle cx="27.5" cy="26.5" r="0.5"/>
  </g>
</svg>
